args:
  checkpoint: null
  exp_name: wheel_leg_walking_v1
  headless: false
  max_iterations: 5000
  num_envs: 4096
command_cfg:
  ang_vel_range:
  - -2.0
  - 2.0
  command_curriculum:
    ang_vel:
      end: 2.0
      start: 0.5
      steps: 5000
    lin_vel_x:
      end: 0.8
      start: 0.2
      steps: 5000
  lin_vel_x_range:
  - -0.8
  - 0.8
  lin_vel_y_range:
  - -0.3
  - 0.3
  num_commands: 3
  resampling_time: 4.0
env_cfg:
  action_scale: 0.25
  clip_actions: 1.2
  connect_plane_links:
  - Lleg_Lwheel
  - Rlleg_Rwheel
  - hleg_Llleg
  - Rhleg_Rlleg
  default_joint_angles:
    Lhleg: 0.2
    Llleg: -0.5
    Lwheel: 0.0
    Rhleg: 0.2
    Rlleg: -0.5
    Rwheel: 0.0
  dt: 0.02
  episode_length_s: 20.0
  gravity:
  - 0.0
  - 0.0
  - -9.81
  joint_names:
  - Lhleg
  - Llleg
  - Lwheel
  - Rhleg
  - Rlleg
  - Rwheel
  kd: 1.2
  kp: 40.0
  num_actions: 6
  randomization:
    friction:
      range:
      - 0.5
      - 1.25
    gravity:
      range:
      - -0.5
      - 0.5
    link_mass:
      range:
      - 0.8
      - 1.2
    restitution:
      range:
      - 0.0
      - 0.5
  termination_if_pitch_greater_than: 60
  termination_if_roll_greater_than: 60
  urdf: assets/urdf/wheel_leg.urdf
obs_cfg:
  history_length: 0
  num_obs: 30
  num_slice_obs: 30
  obs_components:
    commands:
    - command
    proprioception:
    - gravity
    - dof_pos
    - dof_vel
    - previous_actions
    velocity:
    - lin_vel
    - ang_vel
  obs_scales:
    ang_vel: 0.25
    command: 1.0
    dof_pos: 1.0
    dof_vel: 0.05
    gravity: 1.0
    lin_vel: 2.0
    previous_actions: 1.0
reward_cfg:
  base_height_target: 0.3
  reward_scales:
    action_rate: -0.001
    base_height: -2.0
    energy: -0.0001
    lin_vel_z: -2.0
    orientation: -0.05
    similar_to_default: -0.005
    survive: 0.5
    tracking_ang_vel: 1.0
    tracking_lin_vel: 2.0
  reward_weights:
    regularization: 0.3
    survival: 0.1
    tracking: 0.6
  tracking_sigma: 0.5
train_cfg:
  algorithm:
    algorithm:
      clip_param: 0.2
      desired_kl: 0.01
      entropy_coef: 0.01
      gamma: 0.99
      lam: 0.95
      learning_rate: 0.001
      max_grad_norm: 1.0
      num_learning_epochs: 5
      num_mini_batches: 4
      schedule: adaptive
      use_clipped_value_loss: true
      value_loss_coef: 1.0
    class_name: PPO
  policy:
    activation: elu
    actor_hidden_dims:
    - 512
    - 256
    - 128
    critic_hidden_dims:
    - 512
    - 256
    - 128
    init_noise_std: 1.0
  runner:
    algorithm_class_name: PPO
    log_interval: 1
    max_iterations: 5000
    num_steps_per_env: 24
    policy_class_name: ActorCritic
    save_interval: 50
